# profile-name: taobe-clash-config
# 订阅链接（国内可访问转发）：https://cdn.jsdelivr.net/gh/DDonlien/clash-config@main/taobe-clash-config.yaml
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: '127.0.0.1:9090'

# 1. 订阅资源
proxy-providers:
  biubiu:
    type: http
    url: "https://eue-l8br0hnh515w.api-biubiu.sbs/biu/subscribe?token=1afb7d7634bde00f2fe6716cfb77722c"
    interval: 3600
    path: ./sub1.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}

  flybit:
    type: http
    url: "https://s.fb.22na.cn/api/v1/ss/8e49417b63c00fd37c6b6471ae0c29c8"
    interval: 3600
    path: ./sub3.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}

  spkun:
    type: http
    url: "https://sub4.515666.xyz/subforwow/5c5e9c82cd6dfa44ef5b6212b9b859cc"
    interval: 3600
    path: ./sub4.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}

# 2. 策略组
proxy-groups:
  # --- 顶层选择 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 订阅优先可用
      - ⚡ 全局自动
      - 📦 Flybit 订阅
      - 📦 Biubiu 订阅
      - 📦 SPKUN 订阅
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇹🇼 台湾地区
      - 🇰🇷 韩国地区
      - DIRECT

  - name: ⚡ 全局自动
    type: url-test
    use: 
      - flybit
      - biubiu
      - spkun
    url: http://www.gstatic.com/generate_204
    expected-status: 204
    interval: 300
    timeout: 500
    tolerance: 50
    lazy: false

  # --- 手动订阅优先级：按 Flybit -> Biubiu -> SPKUN，超过 500ms 或不可用则降级 ---
  - name: ♻️ 订阅优先可用
    type: fallback
    proxies:
      - ⚡ Flybit 自动
      - ⚡ Biubiu 自动
      - ⚡ SPKUN 自动
    url: http://www.gstatic.com/generate_204
    interval: 300
    timeout: 500
    lazy: false

  # --- 按订阅分组：组内可手动选节点，也可先走该订阅自动测速 ---
  - name: 📦 Flybit 订阅
    type: select
    proxies:
      - ⚡ Flybit 自动
    use:
      - flybit

  - name: ⚡ Flybit 自动
    type: url-test
    hidden: true
    use:
      - flybit
    url: http://www.gstatic.com/generate_204
    expected-status: 204
    interval: 300
    timeout: 500
    tolerance: 50
    lazy: false

  - name: 📦 Biubiu 订阅
    type: select
    proxies:
      - ⚡ Biubiu 自动
    use:
      - biubiu

  - name: ⚡ Biubiu 自动
