# profile-name: taobe-clash-config
# 订阅链接（国内可访问转发）：https://cdn.jsdelivr.net/gh/DDonlien/clash-config@main/taobe-clash-config.yaml
#
# ============================================================================
# 流量类型定义（改这里就改了全文件，搜索 "monthly_providers" 找到所有引用）
# ============================================================================
#   - monthly_providers : 包月订阅，每月重置流量，鼓励日常消耗（首选）
#   - total_providers   : 包流量订阅，永久有效但总量有限，留给重要场景（兜底）
#   - all_providers     : 全部订阅（用于"自动测速"等不分流量类型的场景）
#
# 想新增包月机场？在这里加上 provider 名 + 在下方 proxy-providers 块加上 URL
__vars__:
  monthly_providers: &monthly_providers
    - biubiu
    - flybit
  total_providers: &total_providers
    - spkun
  all_providers: &all_providers
    - biubiu
    - flybit
    - spkun

port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: "127.0.0.1:9090"

# 1. 订阅资源
proxy-providers:
  biubiu:
    type: http
    url: "https://eue-l8br0hnh515w.api-biubiu.sbs/biu/subscribe?token=1afb7d7634bde00f2fe6716cfb77722c"
    interval: 3600
    path: ./sub1.yaml
    health-check:
      {
        enable: true,
        interval: 600,
        url: "http://www.gstatic.com/generate_204",
      }

  flybit:
    type: http
    url: "https://s.fb.22na.cn/api/v1/ss/8e49417b63c00fd37c6b6471ae0c29c8"
    interval: 3600
    path: ./sub3.yaml
    health-check:
      {
        enable: true,
        interval: 600,
        url: "http://www.gstatic.com/generate_204",
      }

  spkun:
    type: http
    url: "https://sub4.515666.xyz/subforwow/5c5e9c82cd6dfa44ef5b6212b9b859cc"
    interval: 3600
    path: ./sub4.yaml
    health-check:
      {
        enable: true,
        interval: 600,
        url: "http://www.gstatic.com/generate_204",
      }

# 2. 策略组
proxy-groups:
  # --- 顶层选择 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 订阅优先可用
      - ⚡ 全局自动
      - 📦 Flybit 订阅
      - 📦 Biubiu 订阅
      - 📦 SPKUN 订阅
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇹🇼 台湾地区
      - 🇰🇷 韩国地区
      - DIRECT

  # --- 全局自动测速（混三家，不分流量类型）---
  - name: ⚡ 全局自动
    type: url-test
    use: *all_providers
    url: https://www.netflix.com/
    interval: 300
    timeout: 500
    tolerance: 50
    lazy: false

  # --- 订阅优先可用：包月里测速选最快，包月挂了降级到包流量里测速 ---
  - name: ♻️ 订阅优先可用
    type: fallback
    proxies:
      - ⚡ 月度自动
      - ⚡ 总量自动
    url: https://www.netflix.com/
    interval: 300
    timeout: 500
    lazy: false

  # --- 月度包月：包月机场里测速选最快 ---
  - name: ⚡ 月度自动
    type: url-test
    hidden: true
    use: *monthly_providers
    url: https://www.netflix.com/
    interval: 300
    timeout: 500
    tolerance: 50
    lazy: false

  # --- 总量包流量：包流量机场里测速选最快（兜底用）---
  - name: ⚡ 总量自动
    type: url-test
    hidden: true
    use: *total_providers
    url: https://www.netflix.com/
    interval: 300
    timeout: 500
    tolerance: 50
    lazy: false

  # --- 按订阅分组：组内可手动选节点，也可先走该订阅自动测速 ---
  - name: 📦 Flybit 订阅
    type: select
    proxies:
      - ⚡ Flybit 自动
    use:
      - flybit

  - name: ⚡ Flybit 自动
    type: url-test
    hidden: true
