# 顶级自动化分流配置 - 解决客户端节点渲染丢失 Bug
# profile-name: Taobe's Custom Config
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: '127.0.0.1:9090'

# 1. 订阅资源
proxy-providers:
  sub99:
    type: http
    url: "https://ycexbktkoctx.sealosgzg.site/api/sub/3013ec5f494f77a2697b4ae5f9c335d4"
    interval: 3600
    path: ./sub1.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}
  biubiu:
    type: http
    url: "https://eue-l8br0hnh515w.api-biubiu.sbs/biu/subscribe?token=1afb7d7634bde00f2fe6716cfb77722c"
    interval: 3600
    path: ./sub2.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}
  flybit:
    type: http
    url: "https://rutnzgnkphxs.sealosgzg.site/api/v1/ss/8e49417b63c00fd37c6b6471ae0c29c8"
    interval: 3600
    path: ./sub3.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}
  spkun:
    type: http
    url: "https://sub4.515666.xyz/subforwow/5c5e9c82cd6dfa44ef5b6212b9b859cc"
    interval: 3600
    path: ./sub4.yaml
    health-check: {enable: true, interval: 600, url: "http://www.gstatic.com/generate_204"}

# 2. 策略组
proxy-groups:
  # --- 顶层选择 ---
  - name: 🚀 节点选择
    type: select
    proxies:
      - ⚡ 全局自动
      - 📦 99 订阅
      - 📦 Flybit 订阅
      - 📦 Biubiu 订阅
      - 📦 SPKUN 订阅
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇹🇼 台湾地区
      - 🇰🇷 韩国地区
      - DIRECT

  - name: ⚡ 全局自动
    type: url-test
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --- 按订阅分组：组内可手动选节点，也可先走该订阅自动测速 ---
  - name: 📦 99 订阅
    type: select
    proxies:
      - ⚡ 99 自动
    use:
      - sub99

  - name: ⚡ 99 自动
    type: url-test
    hidden: true
    use:
      - sub99
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 📦 Flybit 订阅
    type: select
    proxies:
      - ⚡ Flybit 自动
    use:
      - flybit

  - name: ⚡ Flybit 自动
    type: url-test
    hidden: true
    use:
      - flybit
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 📦 Biubiu 订阅
    type: select
    proxies:
      - ⚡ Biubiu 自动
    use:
      - biubiu

  - name: ⚡ Biubiu 自动
    type: url-test
    hidden: true
    use:
      - biubiu
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  - name: 📦 SPKUN 订阅
    type: select
    proxies:
      - ⚡ SPKUN 自动
    use:
      - spkun

  - name: ⚡ SPKUN 自动
    type: url-test
    hidden: true
    use:
      - spkun
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --- 地区详情组（注意这里：固定项和订阅拉取分写） ---
  - name: 🇭🇰 香港地区
    type: select
    proxies: 
      - 🇭🇰 香港-自动测速
      - DIRECT
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(香港|\bHK\b|HKG|Hong[ -]?Kong|HKBN|HKT)'

  - name: 🇭🇰 香港-自动测速
    type: url-test
    hidden: true
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(香港|\bHK\b|HKG|Hong[ -]?Kong|HKBN|HKT)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇯🇵 日本地区
    type: select
    proxies: 
      - 🇯🇵 日本-自动测速
      - DIRECT
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(日本|\bJP\b|JPN|Japan|Tokyo|Osaka|东京|大阪)'

  - name: 🇯🇵 日本-自动测速
    type: url-test
    hidden: true
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(日本|\bJP\b|JPN|Japan|Tokyo|Osaka|东京|大阪)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇺🇸 美国地区
    type: select
    proxies: 
      - 🇺🇸 美国-自动测速
      - DIRECT
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(美国|\bUS\b|USA|United States|America|New York|Los Angeles|San Jose|Seattle|Dallas|Chicago|Ashburn|Silicon Valley|Fremont|Phoenix)'

  - name: 🇺🇸 美国-自动测速
    type: url-test
    hidden: true
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(美国|\bUS\b|USA|United States|America|New York|Los Angeles|San Jose|Seattle|Dallas|Chicago|Ashburn|Silicon Valley|Fremont|Phoenix)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇸🇬 新加坡地区
    type: select
    proxies: 
      - 🇸🇬 新加坡-自动测速
      - DIRECT
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(新加坡|\bSG\b|SGP|Singapore|SIN|狮城)'

  - name: 🇸🇬 新加坡-自动测速
    type: url-test
    hidden: true
    use: 
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(新加坡|\bSG\b|SGP|Singapore|SIN|狮城)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇹🇼 台湾地区
    type: select
    proxies:
      - 🇹🇼 台湾-自动测速
      - DIRECT
    use:
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(台湾|台灣|\bTW\b|TWN|Taiwan|Taipei|台北|新北|Taichung)'

  - name: 🇹🇼 台湾-自动测速
    type: url-test
    hidden: true
    use:
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(台湾|台灣|\bTW\b|TWN|Taiwan|Taipei|台北|新北|Taichung)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  - name: 🇰🇷 韩国地区
    type: select
    proxies:
      - 🇰🇷 韩国-自动测速
      - DIRECT
    use:
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(韩国|韓國|\bKR\b|KOR|Korea|Seoul|首尔|首爾|Busan|釜山)'

  - name: 🇰🇷 韩国-自动测速
    type: url-test
    hidden: true
    use:
      - sub99
      - flybit
      - biubiu
      - spkun
    filter: '(?i)(韩国|韓國|\bKR\b|KOR|Korea|Seoul|首尔|首爾|Busan|釜山)'
    url: http://www.gstatic.com/generate_204
    interval: 300

  # --- 业务逻辑层 ---
  - name: 🤖 AI 工具
    type: select
    proxies:
      - 🇺🇸 美国地区
      - 🇸🇬 新加坡地区
      - 🇯🇵 日本地区
      - 🇭🇰 香港地区
      - 🚀 节点选择
      - DIRECT

  - name: Ⓜ️ 微软服务
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: 🍏 Apple 通用服务
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🇺🇸 美国地区
      - 🚀 节点选择

  - name: 📺 Apple TV 服务
    type: select
    proxies:
      - DIRECT
      - 🇺🇸 美国地区
      - 🇭🇰 香港地区
      - 🇯🇵 日本地区
      - 🇸🇬 新加坡地区
      - 🚀 节点选择

  - name: GLOBAL
    type: select
    proxies:
      - 🚀 节点选择
      - DIRECT

